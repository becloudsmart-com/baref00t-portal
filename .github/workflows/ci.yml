# Public-mirror CI — runs on every push/PR to the OSS portal repo.
# This workflow exists in the public repo only; the upstream private monorepo
# uses its own CI under .github/workflows/publish-portal.yml.
#
# No secrets — pure build/test/typecheck.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with: { node-version: 20.x, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: baref00t-portal:ci
      - name: Smoke test container starts
        run: |
          # Don't actually start (would need full env) — just confirm the
          # image can be pulled and inspected.
          docker inspect baref00t-portal:ci > /dev/null
