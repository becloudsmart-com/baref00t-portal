# baref00t partner-portal — example docker-compose file.
#
# Copy this to docker-compose.yml, then create a `.env` file in the same
# directory with the required env vars (see docs/ENV-REFERENCE.md).
#
#   docker compose up -d
#
# To upgrade:
#   docker compose pull && docker compose up -d

services:
  portal:
    image: ghcr.io/becloudsmart-com/baref00t-portal:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
